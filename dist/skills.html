<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Skills</title>
</head>
<body class="bg-black text-white">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 opacity-0 pointer-events-none transition-opacity duration-300 md:z-40"></div>

    <div id="main-content" class="min-h-screen flex flex-col">
        <header class="mt-3 mx-4 md:mx-7 animate-slideDown">
            <div class="flex md:flex-row items-center justify-between relative">
                <div class="flex items-center z-30">
                    <button id="mobile-menu-button" class="md:hidden mt-1 mr-3 md:mr-2 active:scale-75 transition-all duration-300">
                        <img src="../icons/nav.svg" class="w-5 h-5 md:w-6 md:h-6">
                    </button>
    
                    <a href="./index.html" class="flex text-2xl md:text-4xl font-semibold text-transparent bg-clip-text bg-gradient-to-t from-white to-gray-400 ">
                        <img src="../icons/code.svg" class="mt-2 mr-2 hidden md:block">
                        Portfolio
                    </a>
                </div>
    
                <nav id="sidebar" class="fixed  top-0 left-0 h-full w-64 transform -translate-x-full transition-transform duration-500 ease-in-out md:relative md:transform-none md:flex md:items-center bg-gradient-to-b from-neutral-950 to-neutral-900 md:bg-none z-50">
                    <div class="flex justify-between items-center w-full px-8 pt-6 md:hidden">
                        <a href="./index.html" class="md:hidden">
                            <img src="../icons/home.svg" class="w-6 h-6 active:scale-90 transition-all duration-300">
                        </a>
    
                        <button id="close-menu-button" class="active:scale-90 transition-all duration-300">
                            <img src="../icons/cross.svg">
                        </button>
                    </div>
        
                    <section class="flex flex-col space-y-8 p-8 text-sm text-gray-400 md:text-base md:flex-row md:space-y-0 md:space-x-11 ">
                        <a href="./skills.html" class="hover:text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] transition-all duration-300">Skills</a>
                        <a href="./projects.html" class="hover:text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] transition-all duration-300">Projects</a>
                        <a href="./about.html" class="hover:text-white hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] transition-all duration-300">About</a>
                    </section>
                </nav>
    
                <button class="z-30 px-2 py-1.5 text-sm font-semibold md:text-base rounded-xl bg-opacity-10 bg-white text-gray-300 hover:text-white border border-white/10 backdrop-blur-sm hover:bg-white/20 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] active:scale-95 transition-all duration-250">
                    Contact Me
                </button>
            </div>
        </header>
    </div>
    <script src="./js/navbar.js"></script>
